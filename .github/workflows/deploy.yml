name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install Dependencies
      - name: Install Dependencies
        run: npm install

      # 3. Build Project
      - name: Build Project
        run: npm run build

      # 4. Clean + Reset Folder (STRONG CLEAN)
      - name: Clean and prepare Demo folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/html/TV_Screens/Demo
            sudo mkdir -p /var/www/html/TV_Screens/Demo
            sudo chown -R ubuntu:ubuntu /var/www/html/TV_Screens/Demo
            sudo chmod -R 755 /var/www/html/TV_Screens/Demo

      # 5. Upload Build Files (FLAT STRUCTURE)
      - name: Upload build files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/html/TV_Screens/Demo"
          overwrite: true
          strip_components: 1

      # 6. Set Correct Permissions (FINAL FIX)
      - name: Set permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo chown -R ubuntu:ubuntu /var/www/html/TV_Screens/Demo
            sudo chmod -R 755 /var/www/html/TV_Screens/Demo

      # 7. Restart Nginx (apply changes)
      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart nginx
